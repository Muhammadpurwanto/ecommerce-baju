name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # 1. Job Lint & Unit Test
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Run Go Unit Tests
        run: |
          for dir in services/user services/cart services/product services/order services/payment services/notification; do
            echo "Running tests in $dir..."
            (cd "$dir" && go test ./...)
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend Lint & Build Check
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run build

  # 2. Job Integration & Smoke Test
  integration-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Prepare Local Env Files
        run: |
          # Copy file .env.example menjadi .env pada setiap service agar docker-compose dev bisa berjalan
          for file in services/*/.env.example; do
            cp "$file" "${file%.example}"
          done

      - name: Build & Spin Up Services (Docker Compose)
        run: |
          docker compose up -d --build

      - name: Wait for Services to be Healthy
        run: |
          # Tunggu service gateway & database mysql sehat
          echo "Waiting for database and gateway to be ready..."
          sleep 30
          docker compose ps

      - name: Run E2E Smoke Test (seed.go)
        run: |
          # Jalankan E2E testing
          cd scripts && go run seed.go

      - name: Print Container Logs on Failure
        if: failure()
        run: |
          docker compose logs

      - name: Shutdown Docker Compose
        if: always()
        run: |
          docker compose down -v

  # 3. Job Build & Push Docker Images (Hanya saat push/merge ke branch main)
  build-and-push:
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build & Push User Service
      - name: Build and Push User Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/user/Dockerfile
          push: true
          tags: |
            maspurr/ecommerce-user:latest
            maspurr/ecommerce-user:${{ github.sha }}

      # Build & Push Product Service
      - name: Build and Push Product Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/product/Dockerfile
          push: true
          tags: |
            maspurr/ecommerce-product:latest
            maspurr/ecommerce-product:${{ github.sha }}

      # Build & Push Cart Service
      - name: Build and Push Cart Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/cart/Dockerfile
          push: true
          tags: |
            maspurr/ecommerce-cart:latest
            maspurr/ecommerce-cart:${{ github.sha }}

      # Build & Push Order Service
      - name: Build and Push Order Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/order/Dockerfile
          push: true
          tags: |
            maspurr/ecommerce-order:latest
            maspurr/ecommerce-order:${{ github.sha }}

      # Build & Push Payment Service
      - name: Build and Push Payment Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/payment/Dockerfile
          push: true
          tags: |
            maspurr/ecommerce-payment:latest
            maspurr/ecommerce-payment:${{ github.sha }}

      # Build & Push Notification Service
      - name: Build and Push Notification Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/notification
          file: ./services/notification/Dockerfile
          push: true
          tags: |
            maspurr/ecommerce-notification:latest
            maspurr/ecommerce-notification:${{ github.sha }}

      # Build & Push Gateway Service
      - name: Build and Push Gateway Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./services/gateway/Dockerfile
          push: true
          tags: |
            maspurr/ecommerce-gateway:latest
            maspurr/ecommerce-gateway:${{ github.sha }}

      # Build & Push Frontend Service
      - name: Build and Push Frontend Service
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            maspurr/ecommerce-frontend:latest
            maspurr/ecommerce-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.maspurr.cloud/api/v1

  # 4. Job Deployment ke VPS (Hanya saat push/merge ke branch main)
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Install Cloudflare Client (cloudflared)
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.maspurr.cloud
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          proxy_command: cloudflared access ssh --hostname %h
          script: |
            cd /home/maspurr/ecommerce-baju
            
            # Pull image versi terbaru dari Docker Hub
            docker compose -f docker-compose.prod.yml pull
            
            # Restart kontainer menggunakan image yang baru ditarik
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            
            # Bersihkan images yang menggantung (dangling) untuk menghemat space disk VPS
            docker image prune -f

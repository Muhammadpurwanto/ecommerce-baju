syntax = "proto3";

package pb;

option go_package = "github.com/Muhammadpurwanto/ecommerce-baju/services/common/pb/product";

// ==========================
// CATEGORY
// ==========================
service CategoryService {
  rpc GetAllCategories(Empty) returns (CategoryListResponse);
  rpc GetCategoryByID(GetByIDRequest) returns (CategoryResponse);
  rpc CreateCategory(CategoryRequest) returns (CategoryResponse);
  rpc UpdateCategory(UpdateCategoryRequest) returns (CategoryResponse);
  rpc DeleteCategory(GetByIDRequest) returns (EmptyResponse);
}

message CategoryRequest {
  string name = 1;
}

message UpdateCategoryRequest {
  uint32 id = 1;
  string name = 2;
}

message CategoryResponse {
  uint32 id = 1;
  string name = 2;
  string slug = 3;
  string created_at = 4;
  string updated_at = 5;
}

message CategoryListResponse {
  repeated CategoryResponse data = 1;
}

// ==========================
// PRODUCT
// ==========================
service ProductService {
  rpc GetAllProducts(GetAllProductsRequest) returns (ProductListResponse);
  rpc GetProductByID(GetByIDRequest) returns (ProductResponse);
  rpc CreateProduct(ProductRequest) returns (ProductResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (ProductResponse);
  rpc DeleteProduct(GetByIDRequest) returns (EmptyResponse);
  rpc ReserveStock(ReserveStockRequest) returns (StockResponse);
  rpc ReleaseStock(ReleaseStockRequest) returns (StockResponse);
}

message GetAllProductsRequest {
  int32 page = 1;
  int32 per_page = 2;
}

message ProductRequest {
  uint32 category_id = 1;
  string name = 2;
  string description = 3;
  string brand = 4;
  string gender = 5;
  double base_price = 6;
  double weight = 7;
  bool is_active = 8;
  string image_url = 9;
  int32 stock = 10;
}

message UpdateProductRequest {
  uint32 id = 1;
  uint32 category_id = 2;
  string name = 3;
  string description = 4;
  string brand = 5;
  string gender = 6;
  double base_price = 7;
  double weight = 8;
  bool is_active = 9;
  string image_url = 10;
  int32 stock = 11;
}

message ProductResponse {
  uint32 id = 1;
  uint32 category_id = 2;
  string name = 3;
  string slug = 4;
  string description = 5;
  string brand = 6;
  string gender = 7;
  double base_price = 8;
  double weight = 9;
  bool is_active = 10;
  string image_url = 11;
  int32 stock = 12;
  string created_at = 13;
  string updated_at = 14;
}

message ProductListResponse {
  repeated ProductResponse data = 1;
  int32 page = 2;
  int32 per_page = 3;
  int64 total = 4;
  int32 total_pages = 5;
}

// ==========================
// COMMONS
// ==========================
message Empty {}
message EmptyResponse {
  bool success = 1;
}

message GetByIDRequest {
  uint32 id = 1;
}

message StockItem {
  uint32 product_id = 1;
  int32 quantity = 2;
}

message ReserveStockRequest {
  repeated StockItem items = 1;
}

message ReleaseStockRequest {
  repeated StockItem items = 1;
}

message StockResponse {
  bool success = 1;
  string message = 2;
}

services:
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-secretpassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deployments/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 30s

  user-service:
    image: maspurr/ecommerce-user:latest
    container_name: ecommerce-user-service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_PORT: "8082"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secretpassword}
      MYSQL_DATABASE: user_db
      JWT_SECRET: ${JWT_SECRET:-rahasia-negara-paling-aman-yang-sangat-panjang-sekali}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispassword}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://rmqadmin:rmqpassword@rabbitmq:5672/}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-password123}
      MINIO_BUCKET: users
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://storage.maspurr.cloud}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://maspurr.cloud,http://maspurr.cloud}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL}
      FRONTEND_CALLBACK_URL: ${FRONTEND_CALLBACK_URL}

  product-service:
    image: maspurr/ecommerce-product:latest
    container_name: ecommerce-product-service
    restart: always
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_PORT: "8083"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secretpassword}
      MYSQL_DATABASE: product_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispassword}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-admin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-password123}
      MINIO_BUCKET: products
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://storage.maspurr.cloud}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://maspurr.cloud,http://maspurr.cloud}

  cart-service:
    image: maspurr/ecommerce-cart:latest
    container_name: ecommerce-cart-service
    restart: always
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_PORT: "8084"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secretpassword}
      MYSQL_DATABASE: cart_db
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispassword}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://maspurr.cloud,http://maspurr.cloud}

  order-service:
    image: maspurr/ecommerce-order:latest
    container_name: ecommerce-order-service
    restart: always
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:                    
        condition: service_healthy
    environment:
      APP_PORT: "8085"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secretpassword}
      MYSQL_DATABASE: order_db
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://rmqadmin:rmqpassword@rabbitmq:5672/}
      PRODUCT_SERVICE_URL: product-service:50053
      CART_SERVICE_URL: cart-service:50054
      PAYMENT_SERVICE_URL: payment-service:50056
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://maspurr.cloud,http://maspurr.cloud}

  payment-service:
    image: maspurr/ecommerce-payment:latest
    container_name: ecommerce-payment-service
    restart: always
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:                  
        condition: service_healthy
    environment:
      APP_PORT: "8086"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secretpassword}
      MYSQL_DATABASE: payment_db
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
      MIDTRANS_IS_PROD: ${MIDTRANS_IS_PROD:-false}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://rmqadmin:rmqpassword@rabbitmq:5672/}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://maspurr.cloud,http://maspurr.cloud}
      FRONTEND_URL: ${FRONTEND_URL:-https://maspurr.cloud}

  notification-service:
    image: maspurr/ecommerce-notification:latest
    container_name: ecommerce-notification-service
    restart: always
    ports:
      - "8087:8087"
    depends_on:
      rabbitmq:                    
        condition: service_healthy
    environment:
      APP_PORT: "8087"
      SMTP_HOST: ${SMTP_HOST:-sandbox.smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-2525}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SENDER_NAME: ${SENDER_NAME:-Ecommerce Baju API}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://rmqadmin:rmqpassword@rabbitmq:5672/}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://maspurr.cloud,http://maspurr.cloud}

  gateway-service:
    image: maspurr/ecommerce-gateway:latest
    container_name: ecommerce-gateway-service
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service
    environment:
      APP_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-rahasia-negara-paling-aman-yang-sangat-panjang-sekali}
      AUTH_SERVICE_URL: user-service:50052
      USER_SERVICE_URL: user-service:50052
      PRODUCT_SERVICE_URL: product-service:50053
      CART_SERVICE_URL: cart-service:50054
      ORDER_SERVICE_URL: order-service:50055
      PAYMENT_SERVICE_URL: payment-service:50056
      AUTH_SERVICE_HTTP_URL: http://user-service:8082
      PRODUCT_SERVICE_HTTP_URL: http://product-service:8083
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redispassword}
      RATE_LIMIT_MAX: "100"
      RATE_LIMIT_EXPIRATION: "60"
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://maspurr.cloud,http://maspurr.cloud}

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-rmqadmin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-rmqpassword}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      retries: 5
      start_period: 20s

  minio:
    image: minio/minio:latest
    container_name: ecommerce-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  frontend-service:
    image: maspurr/ecommerce-frontend:latest
    container_name: ecommerce-frontend-service
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.maspurr.cloud/api/v1}
      API_URL: ${API_URL:-http://gateway-service:8080/api/v1}
    depends_on:
      - gateway-service

volumes:
  mysql_data:
  redis_data:
  minio_data:

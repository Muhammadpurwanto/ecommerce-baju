services:
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secretpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deployments/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      start_period: 30s

  user-service:
    image: maspurr/ecommerce-user:latest
    container_name: ecommerce-user-service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./services/user/.env.production
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      REDIS_PASSWORD: redispassword
      RABBITMQ_URL: amqp://rmqadmin:rmqpassword@rabbitmq:5672/
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_URL: https://storage.maspurr.cloud

  product-service:
    image: maspurr/ecommerce-product:latest
    container_name: ecommerce-product-service
    restart: always
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./services/product/.env.production
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: https://storage.maspurr.cloud

  cart-service:
    image: maspurr/ecommerce-cart:latest
    container_name: ecommerce-cart-service
    restart: always
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./services/cart/.env.production
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis

  order-service:
    image: maspurr/ecommerce-order:latest
    container_name: ecommerce-order-service
    restart: always
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:                    
        condition: service_healthy
    env_file:
      - ./services/order/.env.production
    environment:
      MYSQL_HOST: mysql
      RABBITMQ_URL: amqp://rmqadmin:rmqpassword@rabbitmq:5672/
      PRODUCT_SERVICE_URL: product-service:50053
      CART_SERVICE_URL: cart-service:50054
      PAYMENT_SERVICE_URL: payment-service:50056

  payment-service:
    image: maspurr/ecommerce-payment:latest
    container_name: ecommerce-payment-service
    restart: always
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:                  
          condition: service_healthy
    env_file:
      - ./services/payment/.env.production
    environment:
      MYSQL_HOST: mysql
      RABBITMQ_URL: amqp://rmqadmin:rmqpassword@rabbitmq:5672/

  notification-service:
      image: maspurr/ecommerce-notification:latest
      container_name: ecommerce-notification-service
      restart: always
      ports:
        - "8087:8087"
      depends_on:
        rabbitmq:                    
          condition: service_healthy
      env_file:
        - ./services/notification/.env.production
      environment:
        RABBITMQ_URL: amqp://rmqadmin:rmqpassword@rabbitmq:5672/

  gateway-service:
    image: maspurr/ecommerce-gateway:latest
    container_name: ecommerce-gateway-service
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - ./services/gateway/.env.production
    environment:
      REDIS_HOST: redis
      REDIS_PASSWORD: redispassword
    depends_on:
      - user-service
      - product-service
      - cart-service
      - order-service
      - payment-service

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redispassword
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redispassword", "ping"]
      interval: 10s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ecommerce-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: rmqadmin
      RABBITMQ_DEFAULT_PASS: rmqpassword
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      retries: 5
      start_period: 20s

  minio:
    image: minio/minio:latest
    container_name: ecommerce-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  frontend-service:
    image: maspurr/ecommerce-frontend:latest
    container_name: ecommerce-frontend-service
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: https://api.maspurr.cloud/api/v1
      API_URL: http://gateway-service:8080/api/v1
    depends_on:
      - gateway-service

volumes:
  mysql_data:
  redis_data:
  minio_data:
